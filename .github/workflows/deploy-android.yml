name: Deploy to Play Store

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: fastlane

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version_name=$TAG" >> $GITHUB_OUTPUT
          echo "version_code=$((GITHUB_RUN_NUMBER + 12))" >> $GITHUB_OUTPUT

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Decode key.properties
        run: echo "${{ secrets.KEY_PROPERTIES_BASE64 }}" | base64 --decode > key.properties

      - name: Create Play Store credentials
        run: echo "${{ secrets.PLAY_STORE_CONFIG_JSON }}" > fastlane/play-store-credentials.json

      - name: Update version
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ steps.version.outputs.version_code }}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ steps.version.outputs.version_name }}\"/" app/build.gradle.kts

      - name: Build Release AAB
        run: ./gradlew bundleRelease

      - name: Deploy to Play Store (Internal Testing)
        run: bundle exec fastlane android deploy_internal
        env:
          BUNDLE_GEMFILE: fastlane/Gemfile

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.version_name }}
          path: app/build/outputs/bundle/release/app-release.aab
